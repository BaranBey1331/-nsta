name: Android Build

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Environment Debug
      run: |
        echo "=== Java Version ==="
        java -version
        echo "=== Android Home ==="
        echo $ANDROID_HOME
        echo "=== NDK Directories ==="
        ls -d $ANDROID_HOME/ndk/* || echo "No NDK found in $ANDROID_HOME/ndk"
        echo "=== Installed Packages ==="
        ls /usr/local/lib/android/sdk/ndk || echo "No NDK in /usr/local/lib"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android, armv7-linux-androideabi

    - name: Build
      run: |
        # NDK yolunu GitHub'ın standart yolundan zorla al
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | sort -V | tail -n 1)
        export ANDROID_NDK_HOME=$NDK_PATH
        echo "Using NDK: $ANDROID_NDK_HOME"
        
        # Cargo NDK'yı derlemeden hızlı kurmayı dene (veya normal kur)
        cargo install cargo-ndk --locked || cargo install cargo-ndk
        
        cd rust-core
        cargo ndk -t arm64-v8a -p 28 build --release
        cargo ndk -t armeabi-v7a -p 28 build --release
        
        mkdir -p ../app/src/main/jniLibs/arm64-v8a
        mkdir -p ../app/src/main/jniLibs/armeabi-v7a
        cp target/aarch64-linux-android/release/libinsta_core.so ../app/src/main/jniLibs/arm64-v8a/
        cp target/armv7-linux-androideabi/release/libinsta_core.so ../app/src/main/jniLibs/armeabi-v7a/
        
        cd ..
        chmod +x gradlew
        ./gradlew assembleDebug
EOF
