name: Android Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Sleep for 45 seconds
      run: sleep 45

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: aarch64-linux-android, armv7-linux-androideabi

    - name: Cache cargo-ndk
      id: cache-cargo-ndk
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/cargo-ndk
        key: ${{ runner.os }}-cargo-ndk-v2

    - name: Install cargo-ndk
      if: steps.cache-cargo-ndk.outputs.cache-hit != 'true'
      run: cargo install cargo-ndk

    - name: Build Rust Core (arm64-v8a)
      run: |
        # NDK yolunu daha güvenli tespit et
        if [ -d "$ANDROID_SDK_ROOT/ndk-bundle" ]; then
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk-bundle
        else
          NDK_PATH=$(ls -1 $ANDROID_SDK_ROOT/ndk 2>/dev/null | sort -V | tail -n 1)
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$NDK_PATH
        fi
        echo "Using NDK at: $ANDROID_NDK_HOME"
        
        cd rust-core
        cargo ndk -t arm64-v8a -p 28 build --release
        mkdir -p ../app/src/main/jniLibs/arm64-v8a
        cp target/aarch64-linux-android/release/libinsta_core.so ../app/src/main/jniLibs/arm64-v8a/

    - name: Build Rust Core (armeabi-v7a)
      run: |
        if [ -d "$ANDROID_SDK_ROOT/ndk-bundle" ]; then
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk-bundle
        else
          NDK_PATH=$(ls -1 $ANDROID_SDK_ROOT/ndk 2>/dev/null | sort -V | tail -n 1)
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$NDK_PATH
        fi
        
        cd rust-core
        cargo ndk -t armeabi-v7a -p 28 build --release
        mkdir -p ../app/src/main/jniLibs/armeabi-v7a
        cp target/armv7-linux-androideabi/release/libinsta_core.so ../app/src/main/jniLibs/armeabi-v7a/

    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
EOF
