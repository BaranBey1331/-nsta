name: Android Build

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android, armv7-linux-androideabi

    - name: Install NDK
      uses: n0rt3n/setup-android-ndk@v1
      with:
        ndk-version: r25c

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Build Rust (arm64)
      run: |
        cd rust-core
        cargo ndk -t arm64-v8a -p 28 build --release
        mkdir -p ../app/src/main/jniLibs/arm64-v8a
        cp target/aarch64-linux-android/release/libinsta_core.so ../app/src/main/jniLibs/arm64-v8a/

    - name: Build Rust (armv7)
      run: |
        cd rust-core
        cargo ndk -t armeabi-v7a -p 28 build --release
        mkdir -p ../app/src/main/jniLibs/armeabi-v7a
        cp target/armv7-linux-androideabi/release/libinsta_core.so ../app/src/main/jniLibs/armeabi-v7a/

    - name: Build Android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
EOF
