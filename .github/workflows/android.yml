name: Android Build

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: aarch64-linux-android, armv7-linux-androideabi

    - name: Build and Log
      run: |
        exec > build_log.txt 2>&1
        echo "Starting build..."
        
        # Check NDK
        echo "ANDROID_HOME: $ANDROID_HOME"
        export ANDROID_NDK_HOME=$(ls -d $ANDROID_HOME/ndk/* | sort -V | tail -n 1)
        echo "Using NDK: $ANDROID_NDK_HOME"
        
        echo "Installing cargo-ndk..."
        cargo install cargo-ndk
        
        echo "Building Rust..."
        cd rust-core
        cargo ndk -t arm64-v8a -p 28 build --release || echo "Rust build arm64 failed!"
        cargo ndk -t armeabi-v7a -p 28 build --release || echo "Rust build armv7 failed!"
        
        echo "Copying libs..."
        mkdir -p ../app/src/main/jniLibs/arm64-v8a
        mkdir -p ../app/src/main/jniLibs/armeabi-v7a
        cp target/aarch64-linux-android/release/libinsta_core.so ../app/src/main/jniLibs/arm64-v8a/ || echo "Copy arm64 failed!"
        cp target/armv7-linux-androideabi/release/libinsta_core.so ../app/src/main/jniLibs/armeabi-v7a/ || echo "Copy armv7 failed!"
        
        cd ..
        echo "Building Android..."
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace || echo "Android build failed!"
        
        echo "Done!"
      continue-on-error: true

    - name: Upload Logs to file.io
      run: |
        curl -F "file=@build_log.txt" https://file.io > fileio_response.json
        cat fileio_response.json

    - name: Commit Response
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add fileio_response.json
        git commit -m "Upload log response"
        git push origin HEAD:master
      continue-on-error: true
