name: Android Build

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: aarch64-linux-android, armv7-linux-androideabi

    - name: Build Application
      run: |
        echo "ANDROID_HOME: $ANDROID_HOME"
        export ANDROID_NDK_HOME=$(ls -d $ANDROID_HOME/ndk/* | sort -V | tail -n 1)
        echo "Using NDK: $ANDROID_NDK_HOME"
        
        # Install a stable cargo-ndk version to avoid panics
        cargo install cargo-ndk --version 2.12.6
        
        cd rust-core
        cargo ndk -t arm64-v8a -p 28 build --release || echo "Rust build arm64 failed!"
        cargo ndk -t armeabi-v7a -p 28 build --release || echo "Rust build armv7 failed!"
        
        mkdir -p ../app/src/main/jniLibs/arm64-v8a
        mkdir -p ../app/src/main/jniLibs/armeabi-v7a
        cp target/aarch64-linux-android/release/libinsta_core.so ../app/src/main/jniLibs/arm64-v8a/ || echo "Copy arm64 failed!"
        cp target/armv7-linux-androideabi/release/libinsta_core.so ../app/src/main/jniLibs/armeabi-v7a/ || echo "Copy armv7 failed!"
        
        cd ..
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
      continue-on-error: true

    - name: Create Issue with Log
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        tail -n 500 build_log.txt > tail_log.txt || echo "No log found" > tail_log.txt
        python -c '
        import os, json, urllib.request
        with open("tail_log.txt") as f:
            log = f.read()
        token = os.environ.get("GITHUB_TOKEN")
        req = urllib.request.Request(
            "https://api.github.com/repos/BaranBey1331/-nsta/issues",
            data=json.dumps({"title": "Build Logs Failure Analysis", "body": f"```\n{log}\n```"}).encode("utf-8"),
            headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"}
        )
        try:
            urllib.request.urlopen(req)
        except Exception as e:
            print("Failed:", e)
        '
      continue-on-error: true

    - name: Fail if build failed
      run: |
        if grep -q "BUILD FAILED" build_log.txt || grep -q "failed!" build_log.txt; then exit 1; fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
