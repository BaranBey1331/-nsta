name: Android Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android, armv7-linux-androideabi

    - name: Build Rust Core
      run: |
        # GitHub'ın default NDK konumunu kesinleştir
        export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653
        echo "Using NDK at: $ANDROID_NDK_HOME"
        
        # cargo-ndk yerine doğrudan cargo ile derleme (daha hafif)
        # Ama önce cargo-ndk'nın kurulu olduğundan emin olalım (eğer gerekliyse)
        cargo install cargo-ndk
        
        cd rust-core
        cargo ndk -t arm64-v8a -p 28 build --release
        cargo ndk -t armeabi-v7a -p 28 build --release
        
        mkdir -p ../app/src/main/jniLibs/arm64-v8a
        mkdir -p ../app/src/main/jniLibs/armeabi-v7a
        cp target/aarch64-linux-android/release/libinsta_core.so ../app/src/main/jniLibs/arm64-v8a/
        cp target/armv7-linux-androideabi/release/libinsta_core.so ../app/src/main/jniLibs/armeabi-v7a/

    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
EOF
