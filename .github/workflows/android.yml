name: Android Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android, armv7-linux-androideabi

    - name: Build Rust and Android
      run: |
        # NDK Yolunu Dinamik Al
        export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$(ls -1 $ANDROID_HOME/ndk | sort -V | tail -n 1)
        echo "Using NDK: $ANDROID_NDK_HOME"
        
        # Cargo NDK Kur
        cargo install cargo-ndk
        
        # Rust Derle
        cd rust-core
        cargo ndk -t arm64-v8a -p 28 build --release
        cargo ndk -t armeabi-v7a -p 28 build --release
        
        # Kopyala
        mkdir -p ../app/src/main/jniLibs/arm64-v8a
        mkdir -p ../app/src/main/jniLibs/armeabi-v7a
        cp target/aarch64-linux-android/release/libinsta_core.so ../app/src/main/jniLibs/arm64-v8a/
        cp target/armv7-linux-androideabi/release/libinsta_core.so ../app/src/main/jniLibs/armeabi-v7a/
        
        # Android Derle
        cd ..
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
EOF
